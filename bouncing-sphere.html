<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catch the Balls</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
      color: #fff;
    }
    canvas {
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(255, 60, 60, 0.15);
      cursor: none;
    }
    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 10px;
      font-size: 18px;
      letter-spacing: 2px;
    }
    #hud span { color: #aaa; }
    #hud b { color: #fff; }
  </style>
</head>
<body>
<div id="hud">
  <div><span>SCORE </span><b id="scoreDisplay">0</b></div>
  <div><span>LIVES </span><b id="livesDisplay">❤️❤️❤️</b></div>
</div>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width  = Math.min(window.innerWidth  - 40, 800);
  canvas.height = Math.min(window.innerHeight - 120, 580);

  const W = canvas.width;
  const H = canvas.height;

  // --- Game state ---
  const PADDLE_W = 110, PADDLE_H = 14, PADDLE_Y_OFFSET = 18;
  const RADIUS = 22, TRAIL_LENGTH = 60;
  const GRAVITY = 0.38, WALL_DAMPING = 0.88, MAX_SPEED = 66;
  const MAX_LIVES = 3;

  let score = 0, lives = MAX_LIVES, gameOver = false, flashFrames = 0;
  let paddleX = W / 2;
  let bullets = [];
  let doubleBullets = false;

  // --- High Score ---
  const HS_KEY = 'bouncingball_hs';
  function loadScores() {
    try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch { return []; }
  }
  function saveScores(list) { localStorage.setItem(HS_KEY, JSON.stringify(list)); }
  function isHighScore(s) {
    const list = loadScores();
    return list.length < 10 || s > list[list.length - 1].score;
  }
  function addScore(name, s) {
    const list = loadScores();
    list.push({ name: name.toUpperCase(), score: s });
    list.sort((a, b) => b.score - a.score);
    if (list.length > 10) list.length = 10;
    saveScores(list);
  }

  // Name-entry state
  let enteringName = false;
  let nameChars = ['A', 'A', 'A'];
  let nameCursor = 0; // which char is being edited

  const scoreEl = document.getElementById('scoreDisplay');
  const livesEl = document.getElementById('livesDisplay');

  function updateHUD() {
    scoreEl.textContent = score;
    livesEl.textContent = '❤️'.repeat(lives) + '🖤'.repeat(MAX_LIVES - lives);
  }

  function makeBall(x, y, vx, vy, colors) {
    return { x, y, vx, vy, r: RADIUS, trail: [], colors, caught: false, hitCount: 0 };
  }

  const BALL_DEFS = [
    {
      vx: 2.5, vy: 1.5,
      colors: {
        glowA: 'rgba(120,255,80,0.25)', glowB: 'rgba(30,220,30,0.12)', glowC: 'rgba(0,180,0,0)',
        hi: '#80ff60', mid: '#20e820', lo: '#006b00',
        trailR: (t) => Math.round(120 * (1 - t)), trailG: () => 255, trailB: () => 20,
      },
    },
  ];

  function resetBalls() {
    return [
      makeBall(W / 2, H / 4, BALL_DEFS[0].vx, BALL_DEFS[0].vy, BALL_DEFS[0].colors),
    ];
  }

  let balls = resetBalls();

  // Paddle follows mouse / touch
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    paddleX = e.clientX - rect.left;
  });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    paddleX = e.touches[0].clientX - rect.left;
  }, { passive: false });

  // Arrow key control + spacebar shoot
  const PADDLE_SPEED = 8;
  const BULLET_SPEED = 12;
  const keys = {};
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  function movePaddleByKeys() {
    if (keys['ArrowLeft'])  paddleX -= PADDLE_SPEED;
    if (keys['ArrowRight']) paddleX += PADDLE_SPEED;
    paddleX = clamp(paddleX, PADDLE_W / 2, W - PADDLE_W / 2);
  }

  function updateBullets() {
    const ball = balls[0];
    bullets = bullets.filter(bu => {
      bu.y -= BULLET_SPEED;
      if (bu.y < 0) return false;
      // Hit ball?
      const dx = bu.x - ball.x, dy = bu.y - ball.y;
      if (Math.sqrt(dx*dx + dy*dy) < ball.r + 4) {
        score++;
        updateHUD();
        playHit();
        ball.hitCount++;
        if (ball.hitCount <= 6) playGrow();
        // Knock the ball away from the bullet direction
        ball.vy = -Math.abs(ball.vy) * 1.1 - 4;
        ball.vx += (ball.x - bu.x) * 0.15;
        return false;
      }
      return true;
    });
  }

  function drawBullets() {
    bullets.forEach(bu => {
      ctx.save();
      ctx.shadowColor = 'rgba(255,220,80,0.9)';
      ctx.shadowBlur  = 10;
      ctx.fillStyle   = '#ffe040';
      ctx.beginPath();
      ctx.roundRect(bu.x - 3, bu.y - 10, 6, 14, 3);
      ctx.fill();
      ctx.restore();
    });
  }



  // --- Audio ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playBounce() {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(320, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(160, audioCtx.currentTime + 0.12);
    g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  }

  function playShoot() {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    o.start(); o.stop(audioCtx.currentTime + 0.1);
  }

  function playHit() {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(600, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.25);
    g.gain.setValueAtTime(0.35, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    o.start(); o.stop(audioCtx.currentTime + 0.25);
  }

  function playGrow() {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(200, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.4);
    g.gain.setValueAtTime(0.0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    o.start(); o.stop(audioCtx.currentTime + 0.4);
  }

  // --- Spooky background music ---
  let musicNodes = null;

  function startMusic() {
    if (musicNodes) return;
    const master = audioCtx.createGain();
    master.gain.value = 0.18;
    master.connect(audioCtx.destination);

    // Reverb via convolver
    const convSize = audioCtx.sampleRate * 2.5;
    const convBuf = audioCtx.createBuffer(2, convSize, audioCtx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = convBuf.getChannelData(ch);
      for (let i = 0; i < convSize; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/convSize, 2.5);
    }
    const reverb = audioCtx.createConvolver();
    reverb.buffer = convBuf;
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.55;
    reverb.connect(reverbGain); reverbGain.connect(master);

    // Drone: slow detuned sawtooth pair
    function makeDrone(freq, detune) {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const filt = audioCtx.createBiquadFilter();
      o.type = 'sawtooth';
      o.frequency.value = freq;
      o.detune.value = detune;
      filt.type = 'lowpass';
      filt.frequency.value = 320;
      g.gain.value = 0.4;
      o.connect(filt); filt.connect(g); g.connect(master); g.connect(reverb);
      o.start();
      return o;
    }
    const d1 = makeDrone(55, 0);
    const d2 = makeDrone(55, 8);
    const d3 = makeDrone(82.4, -6);

    // Eerie melody: slow arpeggiated minor intervals
    const melody = [110, 130.8, 146.8, 123.5, 103.8, 116.5, 98, 110];
    let melIdx = 0;
    const melOsc = audioCtx.createOscillator();
    const melGain = audioCtx.createGain();
    const melFilt = audioCtx.createBiquadFilter();
    melOsc.type = 'sine';
    melOsc.frequency.value = melody[0];
    melFilt.type = 'bandpass'; melFilt.frequency.value = 400; melFilt.Q.value = 2;
    melGain.gain.value = 0;
    melOsc.connect(melFilt); melFilt.connect(melGain);
    melGain.connect(master); melGain.connect(reverb);
    melOsc.start();

    // Step the melody every 1.8s
    function stepMelody() {
      melIdx = (melIdx + 1) % melody.length;
      const t = audioCtx.currentTime;
      melOsc.frequency.setValueAtTime(melody[melIdx], t);
      melGain.gain.cancelScheduledValues(t);
      melGain.gain.setValueAtTime(0, t);
      melGain.gain.linearRampToValueAtTime(0.55, t + 0.12);
      melGain.gain.exponentialRampToValueAtTime(0.001, t + 1.6);
      melTimer = setTimeout(stepMelody, 1800);
    }
    let melTimer = setTimeout(stepMelody, 500);

    // Slow LFO tremolo on drones
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.18;
    lfoGain.gain.value = 0.15;
    lfo.connect(lfoGain); lfoGain.connect(d1.detune);
    lfo.start();

    // Key-shift: change drone + melody root every 5-10 seconds
    // Spooky root frequencies (minor/diminished tonalities)
    const roots = [55, 58.3, 61.7, 49, 51.9, 65.4, 69.3];
    function shiftKey() {
      const root = roots[Math.floor(Math.random() * roots.length)];
      const t = audioCtx.currentTime;
      const glide = 2.5;
      d1.frequency.setValueAtTime(d1.frequency.value, t);
      d1.frequency.exponentialRampToValueAtTime(root, t + glide);
      d2.frequency.setValueAtTime(d2.frequency.value, t);
      d2.frequency.exponentialRampToValueAtTime(root, t + glide);
      d3.frequency.setValueAtTime(d3.frequency.value, t);
      d3.frequency.exponentialRampToValueAtTime(root * 1.498, t + glide); // perfect 5th
      // Rescale melody relative to new root
      const scale = root / 55;
      melody.forEach((_, i) => { melody[i] = [110,130.8,146.8,123.5,103.8,116.5,98,110][i] * scale; });
      keyTimer = setTimeout(shiftKey, 5000 + Math.random() * 5000);
    }
    let keyTimer = setTimeout(shiftKey, 5000 + Math.random() * 5000);

    musicNodes = { master, d1, d2, d3, melOsc, lfo, melTimer, keyTimer };
  }

  function stopMusic() {
    if (!musicNodes) return;
    clearTimeout(musicNodes.melTimer);
    clearTimeout(musicNodes.keyTimer);
    [musicNodes.d1, musicNodes.d2, musicNodes.d3, musicNodes.melOsc, musicNodes.lfo].forEach(n => {
      try { n.stop(); } catch(e) {}
    });
    musicNodes.master.disconnect();
    musicNodes = null;
  }

  function playMiss() {
    const bufSize = Math.floor(audioCtx.sampleRate * 0.6);
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'bandpass';
    flt.frequency.setValueAtTime(300, audioCtx.currentTime);
    flt.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.5);
    flt.Q.value = 0.8;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(1.0, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
    src.start(); src.stop(audioCtx.currentTime + 0.6);
  }

  // --- Flame particles ---
  let flameParticles = [];

  function spawnFlames() {
    for (let i = 0; i < 120; i++) {
      flameParticles.push({
        x: Math.random() * W,
        y: H + Math.random() * 10,
        vx: (Math.random() - 0.5) * 5,
        vy: -(Math.random() * 10 + 5),
        life: 1.0,
        decay: Math.random() * 0.018 + 0.012,
        size: Math.random() * 22 + 10,
      });
    }
  }

  function updateFlames() {
    flameParticles = flameParticles.filter(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy *= 0.97;
      p.vx *= 0.98;
      p.size *= 0.985;
      p.life -= p.decay;
      return p.life > 0;
    });
  }

  function drawFlames() {
    flameParticles.forEach(p => {
      const a = p.life;
      const white  = Math.round(p.life * 220);
      const yellow = Math.round(p.life * 200);
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      grad.addColorStop(0,    `rgba(255,255,${white},${a})`);
      grad.addColorStop(0.35, `rgba(255,${yellow},0,${a * 0.85})`);
      grad.addColorStop(0.7,  `rgba(220,40,0,${a * 0.5})`);
      grad.addColorStop(1,    `rgba(80,0,0,0)`);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    });
  }

  // --- Sparkle particles ---
  let sparkleParticles = [];
  const SPARKLE_COLORS = ['#fff', '#ffe066', '#ff66ff', '#66ffff', '#ff6666', '#66ff66'];

  function spawnSparkles(x) {
    for (let i = 0; i < 60; i++) {
      const angle = Math.random() * Math.PI; // downward hemisphere
      const speed = Math.random() * 7 + 2;
      sparkleParticles.push({
        x,
        y: 0,
        vx: Math.cos(angle) * speed * (Math.random() < 0.5 ? 1 : -1),
        vy: Math.sin(angle) * speed,
        life: 1.0,
        decay: Math.random() * 0.022 + 0.012,
        size: Math.random() * 3 + 1.5,
        color: SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)],
      });
    }
  }

  function updateSparkles() {
    sparkleParticles = sparkleParticles.filter(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.18; // gentle gravity
      p.life -= p.decay;
      return p.life > 0 && p.y < H;
    });
  }

  function drawSparkles() {
    sparkleParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  const paddleBottom = H - PADDLE_Y_OFFSET;
  const paddleTop    = paddleBottom - PADDLE_H;

  function updateBall(b) {
    if (b.caught) return;
    b.vy += GRAVITY;
    b.x  += b.vx;
    b.y  += b.vy;

    // Wall collisions
    if (b.x - b.r <= 0)  { b.x = b.r;  b.vx =  Math.abs(b.vx) * WALL_DAMPING; playBounce(); }
    if (b.x + b.r >= W)  { b.x = W - b.r; b.vx = -Math.abs(b.vx) * WALL_DAMPING; playBounce(); }
    if (b.y - b.r <= 0)  { b.y = b.r;  b.vy =  Math.abs(b.vy) * 0.82; playBounce(); spawnSparkles(b.x); doubleBullets = true; }

    // Paddle collision
    const px = clamp(paddleX, PADDLE_W / 2, W - PADDLE_W / 2);
    const paddleLeft  = px - PADDLE_W / 2;
    const paddleRight = px + PADDLE_W / 2;
    if (b.vy > 0 && b.y + b.r >= paddleTop && b.y + b.r <= paddleBottom + b.r
        && b.x >= paddleLeft && b.x <= paddleRight) {
      b.y  = paddleTop - b.r;
      b.vy = -Math.abs(b.vy) * 0.85;
      b.vy = clamp(b.vy, -MAX_SPEED, -2);
      // Add a bit of horizontal nudge based on hit position
      const hitPos = (b.x - px) / (PADDLE_W / 2); // -1 to 1
      b.vx += hitPos * 3;
      b.vx  = clamp(b.vx, -MAX_SPEED * 0.6, MAX_SPEED * 0.6);
      score++;
      updateHUD();
      playBounce();
    }

    // Fell past floor
    if (b.y - b.r > H) {
      lives--;
      flashFrames = 30;
      updateHUD();
      spawnFlames();
      playMiss();
      if (lives <= 0) {
        gameOver = true;
        stopMusic();
        if (isHighScore(score)) {
          enteringName = true;
          nameChars = ['A','A','A']; nameCursor = 0;
        }
        return;
      }
      // Reset the ball
      b.x  = W / 2;
      b.y  = H / 4;
      b.vx = BALL_DEFS[0].vx;
      b.vy = BALL_DEFS[0].vy;
      b.trail = [];
      b.hitCount = 0;
    }

    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > TRAIL_LENGTH) b.trail.shift();
  }

  function collideBalls(a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = a.r + b.r;
    if (dist === 0 || dist >= minDist) return;
    const overlap = (minDist - dist) / 2;
    const nx = dx / dist, ny = dy / dist;
    a.x -= nx * overlap; a.y -= ny * overlap;
    b.x += nx * overlap; b.y += ny * overlap;
    const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
    const dot = dvx * nx + dvy * ny;
    if (dot <= 0) return;
    a.vx -= dot * nx; a.vy -= dot * ny;
    b.vx += dot * nx; b.vy += dot * ny;
  }

  function drawTrail(b) {
    const c = b.colors;
    for (let i = 1; i < b.trail.length; i++) {
      const t = i / b.trail.length;
      ctx.beginPath();
      ctx.arc(b.trail[i].x, b.trail[i].y, b.r * (0.15 + 0.85 * t), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${c.trailR(t)},${c.trailG(t)},${c.trailB(t)},${t * 0.7})`;
      ctx.fill();
    }
  }

  function drawBall(b) {
    const x = b.x, y = b.y, r = b.r;
    const h = b.hitCount;
    ctx.save();
    ctx.lineCap = 'round';

    // Level 1+: neck
    if (h >= 1) {
      ctx.strokeStyle = '#f0c080'; ctx.lineWidth = r * 0.28;
      ctx.beginPath(); ctx.moveTo(x, y + r * 0.95); ctx.lineTo(x, y + r * 1.3); ctx.stroke();
    }
    // Level 2+: torso
    if (h >= 2) {
      ctx.strokeStyle = '#4466cc'; ctx.lineWidth = r * 0.52;
      ctx.beginPath(); ctx.moveTo(x, y + r * 1.3); ctx.lineTo(x, y + r * 2.5); ctx.stroke();
    }
    // Level 3+: arms
    if (h >= 3) {
      ctx.strokeStyle = '#4466cc'; ctx.lineWidth = r * 0.3;
      ctx.beginPath(); ctx.moveTo(x - r*0.22, y + r*1.5); ctx.lineTo(x - r*1.1, y + r*2.0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + r*0.22, y + r*1.5); ctx.lineTo(x + r*1.1, y + r*2.0); ctx.stroke();
    }
    // Level 4+: hands
    if (h >= 4) {
      ctx.fillStyle = '#f0c080';
      ctx.beginPath(); ctx.arc(x - r*1.15, y + r*2.05, r*0.18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + r*1.15, y + r*2.05, r*0.18, 0, Math.PI*2); ctx.fill();
    }
    // Level 5+: legs
    if (h >= 5) {
      ctx.strokeStyle = '#223388'; ctx.lineWidth = r * 0.35;
      ctx.beginPath(); ctx.moveTo(x - r*0.18, y + r*2.5); ctx.lineTo(x - r*0.35, y + r*3.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + r*0.18, y + r*2.5); ctx.lineTo(x + r*0.35, y + r*3.5); ctx.stroke();
    }
    // Level 6+: feet
    if (h >= 6) {
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.ellipse(x - r*0.5, y + r*3.55, r*0.32, r*0.14, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + r*0.5, y + r*3.55, r*0.32, r*0.14,  0.3, 0, Math.PI*2); ctx.fill();
    }

    // Glow
    const glow = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 1.8);
    glow.addColorStop(0, 'rgba(255,220,160,0.3)');
    glow.addColorStop(1, 'rgba(255,180,80,0)');
    ctx.beginPath(); ctx.arc(x, y, r * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = glow; ctx.fill();

    // Head (skin tone circle)
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = '#f0c080'; ctx.fill();
    ctx.strokeStyle = '#a0622a'; ctx.lineWidth = 1.5; ctx.stroke();

    // Wild white hair
    ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = r * 0.18;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * r * 0.28, y - r * 0.75);
      ctx.bezierCurveTo(
        x + i * r * 0.28 + (i * r * 0.2), y - r * 1.5,
        x + i * r * 0.28 + (i * r * 0.3), y - r * 1.7,
        x + i * r * 0.28 + (i * r * 0.15), y - r * 1.85
      );
      ctx.stroke();
    }

    // Eyebrows
    ctx.strokeStyle = '#5a3010'; ctx.lineWidth = r * 0.1;
    ctx.beginPath(); ctx.moveTo(x - r*0.45, y - r*0.25); ctx.lineTo(x - r*0.15, y - r*0.32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + r*0.15, y - r*0.32); ctx.lineTo(x + r*0.45, y - r*0.25); ctx.stroke();

    // Glasses
    ctx.strokeStyle = '#222'; ctx.lineWidth = r * 0.09;
    ctx.beginPath(); ctx.arc(x - r*0.3, y - r*0.1, r*0.22, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x + r*0.3, y - r*0.1, r*0.22, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x - r*0.08, y - r*0.1); ctx.lineTo(x + r*0.08, y - r*0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x - r*0.52, y - r*0.1); ctx.lineTo(x - r*0.72, y - r*0.05); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + r*0.52, y - r*0.1); ctx.lineTo(x + r*0.72, y - r*0.05); ctx.stroke();

    // Eyes
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(x - r*0.3, y - r*0.1, r*0.07, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + r*0.3, y - r*0.1, r*0.07, 0, Math.PI*2); ctx.fill();

    // Nose
    ctx.strokeStyle = '#a06030'; ctx.lineWidth = r*0.08;
    ctx.beginPath(); ctx.moveTo(x, y - r*0.05); ctx.lineTo(x - r*0.1, y + r*0.2); ctx.lineTo(x + r*0.1, y + r*0.2); ctx.stroke();

    // Smile
    ctx.strokeStyle = '#7a3a10'; ctx.lineWidth = r*0.09;
    ctx.beginPath(); ctx.arc(x, y + r*0.15, r*0.25, 0.2, Math.PI - 0.2); ctx.stroke();

    ctx.restore();
  }

  function drawPaddle() {
    const px = clamp(paddleX, PADDLE_W / 2, W - PADDLE_W / 2);
    const grad = ctx.createLinearGradient(px - PADDLE_W/2, paddleTop, px + PADDLE_W/2, paddleBottom);
    grad.addColorStop(0,   '#ffffff');
    grad.addColorStop(0.5, '#a0cfff');
    grad.addColorStop(1,   '#5090dd');
    ctx.beginPath();
    ctx.roundRect(px - PADDLE_W/2, paddleTop, PADDLE_W, PADDLE_H, 7);
    ctx.fillStyle = grad;
    ctx.fill();
    // glow
    ctx.shadowColor = 'rgba(100,180,255,0.7)';
    ctx.shadowBlur  = 14;
    ctx.fill();
    ctx.shadowBlur  = 0;
  }

  function drawOverlay(msg, sub) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 48px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(msg, W/2, H/2 - 20);
    ctx.font = '22px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText(sub, W/2, H/2 + 28);
  }

  function drawNameEntry() {
    ctx.fillStyle = 'rgba(0,0,0,0.82)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    ctx.font = 'bold 36px monospace';
    ctx.fillStyle = '#ffe040';
    ctx.fillText('NEW HIGH SCORE!', W/2, H/2 - 110);

    ctx.font = '24px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Score: ${score}`, W/2, H/2 - 70);

    ctx.font = '20px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Enter your name (↑↓ to change, → to confirm)', W/2, H/2 - 30);

    // Draw the 3 letter boxes
    const boxW = 52, boxH = 60, gap = 18;
    const totalW = 3 * boxW + 2 * gap;
    const startX = W/2 - totalW/2;
    const boxY = H/2 + 0;

    nameChars.forEach((ch, i) => {
      const bx = startX + i * (boxW + gap);
      const isActive = i === nameCursor;
      ctx.fillStyle = isActive ? 'rgba(255,224,64,0.2)' : 'rgba(255,255,255,0.08)';
      ctx.beginPath(); ctx.roundRect(bx, boxY, boxW, boxH, 8); ctx.fill();
      ctx.strokeStyle = isActive ? '#ffe040' : '#555';
      ctx.lineWidth = isActive ? 3 : 1.5;
      ctx.beginPath(); ctx.roundRect(bx, boxY, boxW, boxH, 8); ctx.stroke();

      ctx.font = `bold 38px monospace`;
      ctx.fillStyle = isActive ? '#ffe040' : '#fff';
      ctx.fillText(ch, bx + boxW/2, boxY + 44);
    });

    ctx.font = '17px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('Press ENTER to save', W/2, H/2 + 90);
  }

  function drawHighScoreScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.88)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    ctx.font = 'bold 34px monospace';
    ctx.fillStyle = '#ffe040';
    ctx.fillText('HIGH SCORES', W/2, 60);

    const list = loadScores();
    const rowH = 34, startY = 100;
    list.forEach((entry, i) => {
      const y = startY + i * rowH;
      const isNew = entry.name === nameChars.join('') && entry.score === score && i === list.findIndex(e => e.name === nameChars.join('') && e.score === score);
      ctx.font = isNew ? 'bold 22px monospace' : '20px monospace';
      ctx.fillStyle = i === 0 ? '#ffe040' : isNew ? '#80ff80' : '#ccc';
      ctx.textAlign = 'right';
      ctx.fillText(`${i+1}.`, W/2 - 100, y);
      ctx.textAlign = 'left';
      ctx.fillText(entry.name, W/2 - 80, y);
      ctx.textAlign = 'right';
      ctx.fillText(entry.score, W/2 + 100, y);
    });

    ctx.textAlign = 'center';
    ctx.font = '18px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText('Press SPACE or click to play again', W/2, H - 30);
  }

  function restart() {
    score = 0; lives = MAX_LIVES; gameOver = false; flashFrames = 0;
    enteringName = false; nameChars = ['A','A','A']; nameCursor = 0;
    balls = resetBalls(); bullets = []; flameParticles = []; sparkleParticles = []; doubleBullets = false;
    updateHUD();
    startMusic();
  }

  canvas.addEventListener('click', () => {
    if (gameOver && !enteringName) restart();
    else { audioCtx.resume(); startMusic(); }
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
      e.preventDefault();
      keys[e.code] = true;
    }
    if (e.code === 'Space') {
      e.preventDefault();
      audioCtx.resume();
      if (gameOver && !enteringName) { restart(); return; }
      if (!gameOver) {
        startMusic();
        const px = clamp(paddleX, PADDLE_W / 2, W - PADDLE_W / 2);
        const pt = (H - PADDLE_Y_OFFSET) - PADDLE_H;
        if (doubleBullets) {
          bullets.push({ x: px - 8, y: pt - 4 });
          bullets.push({ x: px + 8, y: pt - 4 });
        } else {
          bullets.push({ x: px, y: pt - 4 });
        }
        playShoot();
      }
    }
    if (enteringName) {
      if (e.code === 'ArrowUp')   { e.preventDefault(); nameChars[nameCursor] = String.fromCharCode((nameChars[nameCursor].charCodeAt(0) - 65 + 1) % 26 + 65); }
      if (e.code === 'ArrowDown') { e.preventDefault(); nameChars[nameCursor] = String.fromCharCode((nameChars[nameCursor].charCodeAt(0) - 65 + 25) % 26 + 65); }
      if (e.code === 'ArrowRight' || e.code === 'Tab') { e.preventDefault(); nameCursor = Math.min(2, nameCursor + 1); }
      if (e.code === 'ArrowLeft') { e.preventDefault(); nameCursor = Math.max(0, nameCursor - 1); }
      if (e.code === 'Enter') {
        addScore(nameChars.join(''), score);
        enteringName = false;
      }
    }
  });

  function loop() {
    // Flash red on miss
    if (flashFrames > 0) {
      ctx.fillStyle = `rgba(255,0,0,${0.18 * flashFrames / 30})`;
      ctx.fillRect(0, 0, W, H);
      flashFrames--;
    } else {
      ctx.fillStyle = 'rgba(10,10,15,0.55)';
      ctx.fillRect(0, 0, W, H);
    }

    if (!gameOver) {
      movePaddleByKeys();
      updateBullets();
      updateFlames();
      updateSparkles();
      balls.forEach(updateBall);
    }

    balls.forEach(drawTrail);
    balls.forEach(drawBall);
    drawFlames();
    drawSparkles();
    drawBullets();
    drawPaddle();

    if (gameOver) {
      if (enteringName) drawNameEntry();
      else drawHighScoreScreen();
    }

    requestAnimationFrame(loop);
  }

  updateHUD();
  loop();
</script>
</body>
</html>
