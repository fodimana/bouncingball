<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Red Sphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(255, 60, 60, 0.15);
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width  = Math.min(window.innerWidth  - 40, 800);
  canvas.height = Math.min(window.innerHeight - 40, 600);

  const W = canvas.width;
  const H = canvas.height;

  const GRAVITY       = 0.45;
  const ENERGY_BOOST  = 1.08;   // multiply vy on floor bounce
  const DAMPING       = 0.82;   // energy kept after floor bounce
  const WALL_DAMPING  = 0.88;
  const RADIUS        = 22;
  const MAX_SPEED     = 66;
  const TRAIL_LENGTH  = 60;

  // Ball definitions: position, velocity, radius, and colour theme
  const balls = [
    {
      x: W / 3,   y: H / 4,  vx: 13.5,  vy: 6,   r: RADIUS,
      trail: [],
      colors: {
        glowA: 'rgba(120,255,80,0.25)', glowB: 'rgba(30,220,30,0.12)', glowC: 'rgba(0,180,0,0)',
        hi: '#80ff60', mid: '#20e820', lo: '#006b00',
        trailR: (t) => Math.round(120 * (1 - t)), trailG: () => 255, trailB: () => 20,
      },
    },
    {
      x: W * 2/3, y: H / 3,  vx: -10.5, vy: 9,   r: RADIUS,
      trail: [],
      colors: {
        glowA: 'rgba(80,160,255,0.25)', glowB: 'rgba(30,80,220,0.12)', glowC: 'rgba(0,0,180,0)',
        hi: '#60b0ff', mid: '#2060e8', lo: '#00006b',
        trailR: () => 20, trailG: (t) => Math.round(120 * (1 - t)), trailB: () => 255,
      },
    },
  ];

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }

  function updateBall(b) {
    b.vy += GRAVITY;
    b.x  += b.vx;
    b.y  += b.vy;

    if (b.y + b.r >= H) {
      b.y  = H - b.r;
      b.vy = -Math.abs(b.vy) * DAMPING * ENERGY_BOOST;
      b.vy = clamp(b.vy, -MAX_SPEED, -1);
    }
    if (b.y - b.r <= 0) {
      b.y  = b.r;
      b.vy = Math.abs(b.vy) * DAMPING;
    }
    if (b.x - b.r <= 0) {
      b.x  = b.r;
      b.vx = Math.abs(b.vx) * WALL_DAMPING;
    }
    if (b.x + b.r >= W) {
      b.x  = W - b.r;
      b.vx = -Math.abs(b.vx) * WALL_DAMPING;
    }

    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > TRAIL_LENGTH) b.trail.shift();
  }

  function collideBalls(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = a.r + b.r;
    if (dist === 0 || dist >= minDist) return;

    // Separate overlap
    const overlap = (minDist - dist) / 2;
    const nx = dx / dist;
    const ny = dy / dist;
    a.x -= nx * overlap;
    a.y -= ny * overlap;
    b.x += nx * overlap;
    b.y += ny * overlap;

    // Elastic collision (equal mass)
    const dvx = a.vx - b.vx;
    const dvy = a.vy - b.vy;
    const dot  = dvx * nx + dvy * ny;
    if (dot <= 0) return;
    a.vx -= dot * nx;
    a.vy -= dot * ny;
    b.vx += dot * nx;
    b.vy += dot * ny;
  }

  function update() {
    balls.forEach(updateBall);
    collideBalls(balls[0], balls[1]);
  }

  function drawTrail(b) {
    const c = b.colors;
    for (let i = 1; i < b.trail.length; i++) {
      const t     = i / b.trail.length;
      const alpha = t * 0.7;
      const size  = b.r * (0.15 + 0.85 * t);
      ctx.beginPath();
      ctx.arc(b.trail[i].x, b.trail[i].y, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${c.trailR(t)},${c.trailG(t)},${c.trailB(t)},${alpha})`;
      ctx.fill();
    }
  }

  function drawBall(b) {
    const c = b.colors;

    const glow = ctx.createRadialGradient(
      b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.05,
      b.x,              b.y,               b.r * 1.6
    );
    glow.addColorStop(0,   c.glowA);
    glow.addColorStop(0.5, c.glowB);
    glow.addColorStop(1,   c.glowC);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 1.6, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    const grad = ctx.createRadialGradient(
      b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.1,
      b.x,               b.y,               b.r
    );
    grad.addColorStop(0,   c.hi);
    grad.addColorStop(0.4, c.mid);
    grad.addColorStop(1,   c.lo);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    const spec = ctx.createRadialGradient(
      b.x - b.r * 0.32, b.y - b.r * 0.38, 1,
      b.x - b.r * 0.2,  b.y - b.r * 0.25, b.r * 0.55
    );
    spec.addColorStop(0,   'rgba(255,255,255,0.75)');
    spec.addColorStop(0.5, 'rgba(255,255,255,0.15)');
    spec.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = spec;
    ctx.fill();
  }

  function drawFloor() {
    const floorGrad = ctx.createLinearGradient(0, H - 3, 0, H);
    floorGrad.addColorStop(0, 'rgba(60,255,60,0.25)');
    floorGrad.addColorStop(1, 'rgba(0,180,0,0.05)');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, H - 3, W, 3);
  }

  function draw() {
    ctx.fillStyle = 'rgba(10,10,15,0.55)';
    ctx.fillRect(0, 0, W, H);

    drawFloor();
    balls.forEach(drawTrail);
    balls.forEach(drawBall);
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>
